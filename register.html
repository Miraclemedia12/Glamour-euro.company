<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glamour Activation | Create Your Creator Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://js.paystack.co/v1/inline.js"></script>
    
    <style>
        :root {
            --gold: #F5C24C;
            --dark-gold: #D4A017;
            --success-green: #4ADE80;
            --bg: #0e0e0e;
        }

        body {
            margin: 0;
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: white;
            min-height: 100vh;
        }

        .luxury-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0e0e0e 100%);
            z-index: -1;
        }

        .gold-text {
            background: linear-gradient(135deg, #fff5c0, var(--gold), var(--dark-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-logo {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            letter-spacing: 4px;
            padding: 20px;
            text-align: center;
        }

        .register-card {
            width: 95%;
            max-width: 500px;
            margin: 20px auto 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(245, 194, 76, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: var(--gold);
            font-weight: 600;
        }

        .input-container { position: relative; width: 100%; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(245, 194, 76, 0.1);
            border-radius: 12px;
            color: white;
            transition: 0.3s;
            appearance: none;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(245, 194, 76, 0.5);
        }

        .btn-gold {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold), var(--dark-gold));
            color: #000;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .summary-box {
            background: rgba(245, 194, 76, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            border: 1px dashed rgba(245, 194, 76, 0.3);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        /* Activity Pop-Up Styles */
        .notification-toast {
            position: fixed;
            bottom: 30px;
            left: -450px; 
            width: 90%;
            max-width: 350px;
            background: rgba(15, 15, 15, 0.98);
            border-left: 4px solid var(--gold);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 0 15px 15px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 9999;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }

        .notification-toast.active { left: 0; }

        .name-highlight { color: var(--gold); font-weight: 600; }
        .amount-highlight { color: var(--success-green); font-weight: 600; }
        
        option { background: #1a1a1a; color: white; }
    </style>
</head>
<body>

<div class="luxury-bg"></div>
<div class="nav-logo gold-text">GLAMOUR</div>

<div class="register-card">
    <div id="step-1">
        <h2 class="text-3xl font-bold text-center mb-2" style="font-family: 'Cinzel', serif;">Join Glamour</h2>
        <p class="text-gray-400 text-center text-sm mb-8">Start earning in Euros & Pounds today.</p>

        <form id="glamour-reg-form" class="space-y-4">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="reg-user" placeholder="glamour_creator" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="reg-email" placeholder="contact@example.com" required>
            </div>

            <div class="form-group">
                <label>Residence (Country & Region)</label>
                <div class="input-container">
                    <select id="reg-location" required style="color: gray;" onchange="this.style.color='white'">
                        <option value="" disabled selected>Choose your location</option>
                        <optgroup label="Nigeria">
                            <option value="Lagos, Nigeria">Lagos</option>
                            <option value="Abuja, Nigeria">Abuja</option>
                            <option value="Rivers, Nigeria">Rivers</option>
                            <option value="Enugu, Nigeria">Enugu</option>
                            <option value="Other, Nigeria">Other (Nigeria)</option>
                        </optgroup>
                        <optgroup label="Europe">
                            <option value="London, UK">United Kingdom</option>
                            <option value="Berlin, Germany">Germany</option>
                            <option value="Paris, France">France</option>
                            <option value="Madrid, Spain">Spain</option>
                            <option value="Rome, Italy">Italy</option>
                            <option value="Other, Europe">Other (Europe)</option>
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-container">
                    <input type="password" id="reg-pass" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('reg-pass', this)"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-container">
                    <input type="password" id="reg-confirm" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" onclick="togglePass('reg-confirm', this)"></i>
                </div>
            </div>

            <button type="submit" class="btn-gold mt-4">Create Account</button>
        </form>
    </div>

    <div id="step-2" class="hidden">
        <h2 class="text-2xl font-bold text-center mb-2 gold-text" style="font-family: 'Cinzel', serif;">Verify Details</h2>
        <div class="summary-box">
            <div class="summary-row"><span>Name:</span> <span id="sum-name">...</span></div>
            <div class="summary-row"><span>Username:</span> <span id="sum-user">...</span></div>
            <div class="summary-row"><span>Location:</span> <span id="sum-loc">...</span></div>
            <div class="summary-row" style="border:none; margin-top:10px;">
                <span class="font-bold text-white">Activation Fee:</span>
                <span class="font-bold text-xl gold-text">14,000 NGN</span>
            </div>
        </div>
        <button id="paystack-trigger" class="btn-gold">Pay ₦14,000 via Paystack</button>
        <button onclick="location.reload()" class="w-full text-gray-500 text-xs mt-4 underline">Edit Info</button>
    </div>
</div>

<div id="toast" class="notification-toast">
    <div class="bg-blue-500/10 p-2 rounded-full">
        <i class="fas fa-user-circle text-blue-400 text-lg"></i>
    </div>
    <div>
        <div class="flex justify-between items-center gap-4">
            <div class="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">Real-time Activity</div>
            <div id="toast-time" class="text-[9px] text-gold-500 font-medium" style="color: var(--gold);">Just now</div>
        </div>
        <div id="toast-msg" class="text-xs text-white leading-tight"></div>
    </div>
</div>

<script>
    const PAYSTACK_KEY = 'Pk_live_ed525c84b668b33982b108f17c1e057e94cb52e3';
    let formData = {};

    function togglePass(id, icon) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
            input.type = "password";
            icon.classList.replace("fa-eye-slash", "fa-eye");
        }
    }

    document.getElementById('glamour-reg-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const p1 = document.getElementById('reg-pass').value;
        const p2 = document.getElementById('reg-confirm').value;
        if(p1 !== p2) { alert("Passwords do not match!"); return; }

        formData = {
            name: document.getElementById('reg-name').value,
            user: document.getElementById('reg-user').value,
            email: document.getElementById('reg-email').value,
            location: document.getElementById('reg-location').value
        };

        document.getElementById('sum-name').innerText = formData.name;
        document.getElementById('sum-user').innerText = "@" + formData.user;
        document.getElementById('sum-loc').innerText = formData.location;
        document.getElementById('step-1').classList.add('hidden');
        document.getElementById('step-2').classList.remove('hidden');
    });

    document.getElementById('paystack-trigger').addEventListener('click', function() {
        const handler = PaystackPop.setup({
            key: PAYSTACK_KEY,
            email: formData.email,
            amount: 14000 * 100,
            currency: 'NGN',
            channels: ['card', 'bank', 'ussd', 'qr', 'mobile_money', 'bank_transfer'],
            callback: function(response) {
                const msg = `👑 *GLAMOUR REGISTRATION*%0A👤 Name: ${formData.name}%0A🆔 User: ${formData.user}%0A📍 Location: ${formData.location}%0A💰 Status: PAID 14,000 NGN`;
                window.location.href = `https://t.me/CoachMiracle1?text=${msg}`;
            }
        });
        handler.openIframe();
    });

    // Dynamic Activity with Location-Specific Names
    const nigeriaNames = ["Chinonso", "Adebayo", "Ifeoma", "Olawale", "Blessing", "Tunde", "Chukwudi", "Amina", "Efe", "Zainab", "Emmanuel", "Precious", "Ruth", "Ndifreke"];
    const euroNames = ["Maximilian", "Chloe", "Alessandro", "Sophie", "Lucas", "Elena", "Matteo", "Isabella", "Hans", "Clara", "James", "Andrew", "Christopher", "Abigail", "Evelyn"];
    
    const locations = [
        {name: "Lagos, Nigeria", isEuro: false}, {name: "London, UK", isEuro: true},
        {name: "Abuja, Nigeria", isEuro: false}, {name: "Berlin, Germany", isEuro: true},
        {name: "Port Harcourt, Nigeria", isEuro: false}, {name: "Paris, France", isEuro: true},
        {name: "Enugu, Nigeria", isEuro: false}, {name: "Madrid, Spain", isEuro: true},
        {name: "Kano, Nigeria", isEuro: false}, {name: "Amsterdam, Netherlands", isEuro: true}
    ];

    function showToast() {
        const toast = document.getElementById('toast');
        const msg = document.getElementById('toast-msg');
        const timeDisplay = document.getElementById('toast-time');
        
        const loc = locations[Math.floor(Math.random() * locations.length)];
        // Pick name based on location
        const user = loc.isEuro ? euroNames[Math.floor(Math.random() * euroNames.length)] : nigeriaNames[Math.floor(Math.random() * nigeriaNames.length)];
        
        const isRegister = Math.random() > 0.5;
        let amtString = "";

        if (isRegister) {
            amtString = loc.isEuro ? "€7" : "₦14,000";
            msg.innerHTML = `<span class="name-highlight">${user}</span> from ${loc.name} just <span class="text-white">registered</span> with <span class="amount-highlight">${amtString}</span>`;
        } else {
            const nairAmt = (Math.floor(Math.random() * 45) + 5) * 2000;
            amtString = loc.isEuro ? "€" + (nairAmt / 2000) : "₦" + nairAmt.toLocaleString();
            msg.innerHTML = `<span class="name-highlight">${user}</span> from ${loc.name} just <span class="text-white">withdrew</span> <span class="amount-highlight">${amtString}</span>`;
        }

        const mins = Math.floor(Math.random() * 9) + 1;
        timeDisplay.innerText = Math.random() > 0.4 ? "Just now" : `${mins} mins ago`;
        
        toast.classList.add('active');
        setTimeout(() => toast.classList.remove('active'), 5000);
        setTimeout(showToast, 15000); 
    }

    setTimeout(showToast, 4000);
</script>

</body>
</html>
